[build]
  command = "npm run validate"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — React Router handles client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker must not be cached (so PWA updates roll out)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
