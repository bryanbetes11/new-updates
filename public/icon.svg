<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>

    <!-- Invert + saturate the PNG so the beige/cream logo becomes bright on black -->
    <filter id="logoInvert" color-interpolation-filters="sRGB">
      <!-- Invert colours -->
      <feComponentTransfer result="inverted">
        <feFuncR type="linear" slope="-1" intercept="1"/>
        <feFuncG type="linear" slope="-1" intercept="1"/>
        <feFuncB type="linear" slope="-1" intercept="1"/>
      </feComponentTransfer>
      <!-- Make it a warm gold/cream tone -->
      <feColorMatrix type="matrix"
        values="1.1  0.05 0    0  0.05
                0.9  1.05 0    0  0
                0.6  0    0.7  0  0
                0    0    0    1  0"/>
    </filter>

    <!-- Glow bloom applied on top of inverted logo -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feComponentTransfer in="blur" result="brightBlur">
        <feFuncR type="linear" slope="2.5"/>
        <feFuncG type="linear" slope="2.2"/>
        <feFuncB type="linear" slope="1.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brightBlur"/>
        <feMergeNode in="brightBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle scanline / gloss overlay gradient -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.11"/>
      <stop offset="48%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Radial ambient glow behind logo -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="48%">
      <stop offset="0%"   stop-color="#c8a840" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#6040a0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Black rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#000000"/>

  <g clip-path="url(#iconClip)">
    <!-- Pure black fill -->
    <rect x="0" y="0" width="512" height="512" fill="#050404"/>

    <!-- Ambient glow blob -->
    <ellipse cx="256" cy="256" rx="230" ry="210" fill="url(#ambientGlow)"/>

    <!-- Logo: invert the PNG (white bg → black, beige text → gold) -->
    <image
      href="Brown_Bold_Minimalist_Church_Ministry_Logo.png"
      x="46" y="100"
      width="420" height="312"
      preserveAspectRatio="xMidYMid meet"
      filter="url(#logoInvert)"
    />

    <!-- Glow bloom pass on the same image -->
    <image
      href="Brown_Bold_Minimalist_Church_Ministry_Logo.png"
      x="46" y="100"
      width="420" height="312"
      preserveAspectRatio="xMidYMid meet"
      filter="url(#glow)"
      opacity="0.55"
    />

    <!-- Gloss sheen over the top half -->
    <rect x="0" y="0" width="512" height="260" fill="url(#gloss)"/>

    <!-- Thin top-edge highlight -->
    <rect x="0" y="0" width="512" height="1.5" rx="1" fill="#ffffff" opacity="0.12"/>
    <!-- Thin left-edge highlight -->
    <rect x="0" y="0" width="1.5" height="512" fill="#ffffff" opacity="0.07"/>

    <!-- Subtle border ring -->
    <rect x="0" y="0" width="512" height="512" rx="112" ry="112"
      fill="none" stroke="#ffffff" stroke-opacity="0.09" stroke-width="2"/>
  </g>
</svg>
